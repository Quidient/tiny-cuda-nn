  build_wheel_windows:
    runs-on: at-test
    strategy:
      matrix:
        cuda:
          - { version: "12.8.0", folder: "cu128" }
          - { version: "13.0.0", folder: "cu130" }

    env:
      PYTHON_VERSION: "3.12"
      PYTORCH_VERSION: "2.8.0"
      CU_VERSION: ${{ matrix.cuda.folder }}
      DISTUTILS_USE_SDK: "1"
      TCNN_CUDA_ARCHITECTURES: "80;86;89;90;120"
      CONDA_ENV: "tinycudann-build"
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.30
      with:
        cuda: ${{ matrix.cuda.version }}
    
    - name: Setup conda environment
      shell: pwsh
      run: |
        # Initialize conda for PowerShell
        conda init powershell
        # Remove existing env if it exists
        conda env remove -n ${{ env.CONDA_ENV }} 2>$null
        # Create fresh conda environment
        conda create -n ${{ env.CONDA_ENV }} python=${{ env.PYTHON_VERSION }} -y
    
    - name: Install dependencies
      shell: pwsh
      run: |
        & (conda info --base | ForEach-Object { "$_\shell\condabin\conda-hook.ps1" })
        conda activate ${{ env.CONDA_ENV }}
        python -m pip install --upgrade pip
        pip install torch==${{ env.PYTORCH_VERSION }} --index-url https://download.pytorch.org/whl/${{ env.CU_VERSION }}
        pip install setuptools wheel packaging
    
    - name: Build wheel
      shell: pwsh
      working-directory: bindings/torch
      run: |
        # Enter VS Developer Shell for cl.exe discovery
        ..\..\scripts\enter_vs_dev_shell.ps1
        & (conda info --base | ForEach-Object { "$_\shell\condabin\conda-hook.ps1" })
        conda activate ${{ env.CONDA_ENV }}
        $env:MAX_JOBS = (Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors
        Write-Host "Building with MAX_JOBS=$env:MAX_JOBS"
        python setup.py bdist_wheel
    
    - name: Upload wheel artifact
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      uses: actions/upload-artifact@v4
      with:
        name: tinycudann-wheel-windows-py${{ env.PYTHON_VERSION }}-${{ env.CU_VERSION }}
        path: bindings/torch/dist/*.whl
        retention-days: 30
    
    - name: Run basic tests
      shell: pwsh
      run: |
        & (conda info --base | ForEach-Object { "$_\shell\condabin\conda-hook.ps1" })
        conda activate ${{ env.CONDA_ENV }}
        pip install (Get-ChildItem bindings/torch/dist/*.whl).FullName
        python -c "import tinycudann; print(f'tiny-cuda-nn loaded successfully')"
        python -c "import tinycudann as tcnn; print(f'Available: Encoding, Network, NetworkWithInputEncoding')"
    
    - name: Upload wheel to PyPI server
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      shell: pwsh
      run: |
        $WHEEL_FILE = Get-ChildItem bindings/torch/dist/tinycudann*.whl | Select-Object -First 1
        Write-Host "Uploading $WHEEL_FILE to pypiserver packages/${{ env.CU_VERSION }}/"
        # Ensure target folder exists on remote, then copy
        ssh pypi@ci-cd-linux3.quidient.com "mkdir -p /home/pypi/packages/${{ env.CU_VERSION }}"
        scp $WHEEL_FILE.FullName pypi@ci-cd-linux3.quidient.com:/home/pypi/packages/${{ env.CU_VERSION }}/
        Write-Host "Wheel uploaded. Install with:"
        Write-Host "  pip install tinycudann --index-url http://ci-cd-linux3.quidient.com/pypi/${{ env.CU_VERSION }}/simple/"
    
    - name: Cleanup conda environment
      if: always()
      shell: pwsh
      run: |
        conda env remove -n ${{ env.CONDA_ENV }} 2>$null

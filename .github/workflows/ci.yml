  build_wheel_windows:
    runs-on: at-test
    strategy:
      matrix:
        cuda:
          - { version: "12.8.0", folder: "cu128" }
          - { version: "13.0.0", folder: "cu130" }

    env:
      PYTHON_VERSION: "3.12"
      PYTORCH_VERSION: "2.10.0"
      CU_VERSION: ${{ matrix.cuda.folder }}
      DISTUTILS_USE_SDK: "1"
      TCNN_CUDA_ARCHITECTURES: "80;86;89;90;120"
      CONDA_ENV: "tinycudann-build"
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Pre-cleanup Miniconda
      shell: pwsh
      run: |
        $condaDir = "$env:USERPROFILE\miniconda3"
        if (Test-Path $condaDir) {
            Write-Host "Removing existing Miniconda to ensure clean setup..."
            Remove-Item -Recurse -Force $condaDir -ErrorAction SilentlyContinue
        }
        
    - name: Check for pre-installed CUDA
      id: check-cuda
      shell: pwsh
      run: |
        # Take the version (e.g., "12.8.0") and truncate the last .0 part to get "12.8"
        $version = "${{ matrix.cuda.version }}"
        $majorMinor = $version -replace "\.\d+$", ""
        $cudaDir = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$majorMinor"
        if (Test-Path $cudaDir) {
            Write-Host "CUDA v${{ matrix.cuda.version }} found at $cudaDir. Skipping installation."
            echo "cuda_installed=true" >> $env:GITHUB_OUTPUT
            echo "CUDA_PATH=$cudaDir" >> $env:GITHUB_ENV
            echo "PATH=$cudaDir\bin;$env:PATH" >> $env:GITHUB_ENV
        } else {
            Write-Host "CUDA not found. Will install via Jimver/cuda-toolkit."
            echo "cuda_installed=false" >> $env:GITHUB_OUTPUT
        }

    - name: Install CUDA Toolkit
      if: steps.check-cuda.outputs.cuda_installed == 'false'
      uses: Jimver/cuda-toolkit@v0.2.30
      with:
        cuda: ${{ matrix.cuda.version }}
    
    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: ${{ env.CONDA_ENV }}
        python-version: ${{ env.PYTHON_VERSION }}
        auto-activate-base: false
        conda-solver: libmamba
        miniconda-version: "latest"
        use-only-tar-bz2: true

    - name: Install dependencies
      shell: pwsh
      run: |
        conda activate ${{ env.CONDA_ENV }}
        python -m pip install torch==${{ env.PYTORCH_VERSION }} --index-url https://download.pytorch.org/whl/${{ env.CU_VERSION }}
        pip install setuptools wheel packaging
    
    - name: Build wheel
      shell: pwsh
      working-directory: bindings/torch
      run: |
        # 1. Rename pyproject.toml to force legacy setup.py mode
        if (Test-Path "pyproject.toml") {
            Move-Item "pyproject.toml" "pyproject.toml.bak"
        }
        
        # 2. Patch setup.py for CI
        # This replaces the empty list with the specific version
        $torch_req = "${{ env.PYTORCH_VERSION }}+${{ matrix.cuda.folder }}"
        $content = Get-Content setup.py
        $content -replace 'install_requires=\[]', "install_requires=['torch==$torch_req']" | Set-Content setup.py
        Write-Host "Patched setup.py with torch==$torch_req"
        
        # 3. Build using legacy mode
        # Enter VS Developer Shell for cl.exe discovery
        ..\..\scripts\enter_vs_dev_shell.ps1
        conda activate ${{ env.CONDA_ENV }}
        $env:MAX_JOBS = (Get-CimInstance Win32_ComputerSystem).NumberOfLogicalProcessors
        Write-Host "Building with MAX_JOBS=$env:MAX_JOBS"
        python setup.py bdist_wheel

        # 4. Restore original files (Cleanup)
        if (Test-Path "pyproject.toml.bak") {
            Move-Item "pyproject.toml.bak" "pyproject.toml"
        }
        git checkout setup.py
    
    - name: Upload wheel artifact
      if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      uses: actions/upload-artifact@v4
      with:
        name: tinycudann-wheel-windows-py${{ env.PYTHON_VERSION }}-${{ env.CU_VERSION }}
        path: bindings/torch/dist/*.whl
        retention-days: 30
    
    - name: Run basic tests
      shell: pwsh
      run: |
        conda activate ${{ env.CONDA_ENV }}
        pip install (Get-ChildItem bindings/torch/dist/*.whl).FullName
        python -c "import tinycudann; print(f'tiny-cuda-nn loaded successfully')"
        python -c "import tinycudann as tcnn; print(f'Available: Encoding, Network, NetworkWithInputEncoding')"
    
    - name: Upload wheel to PyPI server
      # if: github.event_name == 'release' || github.ref == 'refs/heads/qmain'
      shell: pwsh
      run: |
        $WHEEL_FILE = Get-ChildItem bindings/torch/dist/tinycudann*.whl | Select-Object -First 1
        Write-Host "Uploading $WHEEL_FILE to pypiserver packages/${{ env.CU_VERSION }}/"
        # Ensure target folder exists on remote, then copy
        ssh pypi@ci-cd-linux3.quidient.com "mkdir -p /home/pypi/packages/${{ env.CU_VERSION }}"
        scp $WHEEL_FILE.FullName pypi@ci-cd-linux3.quidient.com:/home/pypi/packages/${{ env.CU_VERSION }}/
        Write-Host "Wheel uploaded. Install with:"
        Write-Host "  pip install tinycudann --index-url http://ci-cd-linux3.quidient.com/pypi/${{ env.CU_VERSION }}/simple/"
        
    - name: Post-cleanup Miniconda
      if: always()
      shell: pwsh
      run: |
        $condaDir = "$env:USERPROFILE\miniconda3"
        if (Test-Path $condaDir) {
            Write-Host "Cleaning up Miniconda installation..."
            Remove-Item -Recurse -Force $condaDir -ErrorAction SilentlyContinue
        }